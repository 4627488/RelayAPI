services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      CODEX_BASE_URL: https://chatgpt.com/backend-api/codex
    volumes:
      - relay-api-data:/app/data
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:8080"

volumes:
  relay-api-data:
