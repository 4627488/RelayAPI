services:
  relayapi:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      CODEX_BASE_URL: https://chatgpt.com/backend-api/codex
    volumes:
      - relay-api-data:/app/data
    ports:
      - "3000:3000"

volumes:
  relay-api-data:
