services:
  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - relayapi
    networks: [relay]

  relayapi:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [relay]

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: relay
    volumes:
      - relay-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [relay]

  # CLIProxyAPI is intentionally not exposed publicly. Supply its config and
  # credentials under ./cliproxyapi before enabling this service.
  cpa-plugin:
    build: ./cliproxyapi-plugin
    restart: "no"
    volumes:
      - relay-cpa-plugins:/plugins

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    restart: unless-stopped
    depends_on:
      cpa-plugin:
        condition: service_completed_successfully
    volumes:
      - ./cliproxyapi/config.yaml:/CLIProxyAPI/config.yaml:ro
      - ./cliproxyapi/auths:/root/.cli-proxy-api
      - relay-cpa-plugins:/CLIProxyAPI/plugins:ro
    networks: [relay]

volumes:
  relay-postgres:
  relay-cpa-plugins:
networks:
  relay:
